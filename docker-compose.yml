name: doperepo

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-venues}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # ponytail: migrations rodam no init do container (DB nativo > migration tool no MVP).
      # Para prod, troque por golang-migrate / atlas e remova este mount.
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-venues}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672" # management UI
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # --- Infra adicionada p/ fechar gaps do checklist ---
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
    ports:
      - "${MINIO_API_PORT:-9000}:9000" # API S3
      - "${MINIO_CONSOLE_PORT:-9001}:9001" # console
    volumes:
      - miniodata:/data
    # ponytail: sem healthcheck — nada depende dele ainda. Bucket criado on-demand
    # pelo backend quando o handler de upload existir.

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025" # SMTP (worker de notificação aponta aqui)
      - "8025:8025" # web UI: http://localhost:8025

  adminer:
    image: adminer:latest
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    ports:
      - "8081:8080" # UI: http://localhost:8081
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      target: dev
    environment:
      APP_ENV: development
      APP_PORT: "8080"
      # ponytail: sem go.sum no host (bind mount cobre o da imagem). -mod=mod deixa
      # o `go run` baixar e gravar go.sum no host. Rode `go mod tidy` qd tiver Go local.
      GOFLAGS: -mod=mod
      DATABASE_URL: postgres://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@postgres:5432/${POSTGRES_DB:-venues}?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
      # MinIO/S3 — consumido pelo storage de fotos dos anúncios.
      S3_ENDPOINT: minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minio}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minio123}
      S3_BUCKET: venue-photos
      S3_PUBLIC_URL: http://localhost:${MINIO_API_PORT:-9000}
      # SMTP do worker de notificação (client Go entra junto com a feature).
      SMTP_ADDR: mailpit:1025
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ./backend:/app
      - gomodcache:/go/pkg/mod # persiste módulos entre restarts (go run não rebaixa tudo toda vez)
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:${BACKEND_PORT:-8080}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules # anonymous volume: não deixa o bind mount apagar node_modules da imagem
    depends_on:
      - backend

volumes:
  pgdata:
  rabbitmqdata:
  gomodcache:
  miniodata:
